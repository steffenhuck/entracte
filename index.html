<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entr'acte</title>
  <script data-goatcounter="https://steffenhuck.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #3d0808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 56px;
    }

    .image-wrap {
      width: 85%;
      max-width: 900px;
    }

    .image-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    footer {
      margin-top: 36px;
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: lowercase;
    }

    footer a {
      color: #8a4a4a;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #c89090;
    }

    @media (max-width: 600px) {
      .image-wrap { width: 95%; }
    }
  </style>
</head>
<body>

  <div class="image-wrap">
    <img src="entracte.png" alt="Entr'acte — Napoleon's Final Battle Still To Come">
  </div>

  <footer>
    <a href="https://steffenhuck.github.io/">steffen huck</a>
  </footer>

</body>
</html>
